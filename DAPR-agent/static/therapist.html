<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAPR 心理咨询师监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        
        .header {
            background: #16213e;
            padding: 20px 30px;
            border-bottom: 1px solid #0f3460;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }
        
        .header .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .container {
            display: flex;
            height: calc(100vh - 80px);
        }
        
        /* 左侧会话列表 */
        .sidebar {
            width: 300px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        .sidebar-header h2 {
            font-size: 1rem;
            color: #aaa;
        }
        
        .session-list {
            padding: 10px;
        }
        
        .session-item {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .session-item:hover {
            border-color: #e94560;
        }
        
        .session-item.active {
            background: #0f3460;
            border-color: #e94560;
        }
        
        .session-id {
            font-family: monospace;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .session-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-guidance { background: #6c757d; }
        .status-permission { background: #ffc107; color: #000; }
        .status-drawing { background: #17a2b8; }
        .status-analyzing { background: #6610f2; }
        .status-questioning { background: #fd7e14; }
        .status-generating { background: #e83e8c; }
        .status-selecting { background: #20c997; }
        .status-final { background: #007bff; }
        .status-completed { background: #28a745; }
        
        /* 右侧日志区域 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .log-toolbar {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 1px solid #0f3460;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .log-toolbar button {
            padding: 8px 16px;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            color: #eee;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .log-toolbar button:hover {
            background: #e94560;
        }
        
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .log-entry {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #0f3460;
        }
        
        .log-time {
            font-family: monospace;
            color: #888;
            font-size: 0.85rem;
        }
        
        .log-stage {
            background: #e94560;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .log-session {
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
        }
        
        .log-section {
            margin-bottom: 15px;
        }
        
        .log-section:last-child {
            margin-bottom: 0;
        }
        
        .log-section-title {
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .log-content {
            background: #1a1a2e;
            border-radius: 4px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-content pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .log-content.readable {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }
        
        .log-content.readable p {
            margin: 8px 0;
        }
        
        .log-content.readable strong {
            color: #e94560;
        }
        
        .log-content.readable ul,
        .log-content.readable ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        
        .log-content.readable li {
            margin: 4px 0;
        }
        
        .log-content.readable em {
            color: #888;
            font-style: italic;
        }
        
        .log-content img {
            max-width: 300px;
            max-height: 200px;
            border-radius: 4px;
        }
        
        /* 过滤标签 */
        .filter-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .filter-tag {
            padding: 4px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        
        .filter-tag.active {
            background: #e94560;
            border-color: #e94560;
        }
        
        /* 详情面板 */
        .detail-panel {
            width: 400px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            overflow-y: auto;
            display: none;
        }
        
        .detail-panel.active {
            display: block;
        }
        
        .detail-header {
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        .detail-content {
            padding: 20px;
        }
        
        .detail-section {
            margin-bottom: 25px;
        }
        
        .detail-section h3 {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .detail-item {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        
        .detail-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-size: 0.95rem;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        /* 连接状态 */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #16213e;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
        }
        
        .status-dot.disconnected {
            background: #dc3545;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .sidebar {
                width: 250px;
            }
            .detail-panel {
                width: 350px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 200px;
            }
            .detail-panel {
                width: 100%;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 1000;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 DAPR 心理咨询师监控面板</h1>
        <div class="subtitle">实时监控受试者绘画过程与AI分析结果</div>
    </div>
    
    <div class="connection-status">
        <span class="status-dot" id="ws-status"></span>
        <span id="ws-text">已连接</span>
    </div>
    
    <div class="container">
        <!-- 左侧会话列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>会话列表</h2>
                <button onclick="showHistoryModal()" class="btn-history" style="margin-top: 10px; padding: 8px 16px; background: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; width: 100%;">
                    📂 导入历史会话
                </button>
            </div>
            <div class="session-list" id="session-list">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 历史会话选择弹窗 -->
        <div id="history-modal" class="modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto;">
            <div class="modal-content" style="background: #1a1a2e; max-width: 900px; margin: 50px auto; border-radius: 12px; overflow: hidden;">
                <div class="modal-header" style="background: #16213e; padding: 20px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center;">
                    <h2>📂 选择历史会话进行分析</h2>
                    <button onclick="closeHistoryModal()" style="background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer;">&times;</button>
                </div>
                <div class="modal-body" style="padding: 20px; max-height: 70vh; overflow-y: auto;">
                    <div id="history-loading" style="text-align: center; padding: 40px;">
                        <div class="spinner" style="width: 40px; height: 40px; border: 3px solid #0f3460; border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
                        <p>正在加载历史会话...</p>
                    </div>
                    <div id="history-list" style="display: none;">
                        <!-- 历史会话列表 -->
                    </div>
                    <div id="history-empty" style="display: none; text-align: center; padding: 40px; color: #888;">
                        <div style="font-size: 3rem; margin-bottom: 15px;">📁</div>
                        <p>暂无历史会话</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 中间日志区域 -->
        <div class="main-content">
            <div class="log-toolbar">
                <button onclick="refreshSessions()">🔄 刷新</button>
                <button onclick="clearLogs()">🗑️ 清空</button>
                <div class="filter-tags">
                    <span class="filter-tag active" data-filter="all">全部</span>
                    <span class="filter-tag" data-filter="llm">LLM</span>
                    <span class="filter-tag" data-filter="flux2">FLUX2</span>
                </div>
            </div>
            <div class="log-container" id="log-container">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p>等待新的日志...</p>
                    <p style="font-size: 0.85rem; color: #666; margin-top: 10px;">
                        提示：需要受试者在 <a href="/" target="_blank">localhost:8000</a> 完成绘画才能看到日志
                    </p>
                </div>
            </div>
        </div>
        
        <!-- 右侧详情面板 -->
        <div class="detail-panel" id="detail-panel">
            <div class="detail-header">
                <h2>会话详情</h2>
            </div>
            <div class="detail-content" id="detail-content">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script type="module" src="/static/therapist.js"></script>
</body>
</html>
